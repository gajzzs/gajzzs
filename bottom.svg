<svg width="100%" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F2B"/>
      <stop offset="100%" stop-color="#1B1240"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE39A"/>
      <stop offset="50%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#FF8A3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- <rect width="1200" height="180" fill="url(#sky)"/> -->

  <!-- Twinkling stars -->
  <g fill="#FFFFFF">
    <circle cx="60" cy="30" r="1.4"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="80" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="40" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="110" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="25" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="70" r="1.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="140" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="35" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="95" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="50" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="890" cy="120" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="970" cy="30" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="85" r="1.5"><animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="45" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="150" r="1.3"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="155" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="150" r="1.1"><animate attributeName="opacity" values="1;0.2;1" dur="3.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Shooting star -->
  <g>
    <line x1="0" y1="0" x2="40" y2="20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,0; 900,90; 1300,140; 1300,140" keyTimes="0;0.5;0.7;0.85;1" dur="6s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Rocket group flying left to right with gentle bob -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="-120,80; 1320,40" dur="9s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-8; 0,0; 0,8; 0,0" dur="1.6s" repeatCount="indefinite"/>

      <!-- Exhaust flame -->
      <ellipse cx="-18" cy="0" rx="16" ry="7" fill="url(#flame)">
        <animate attributeName="rx" values="16;22;16" dur="0.3s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Trailing sparks -->
      <circle cx="-30" cy="-3" r="1.6" fill="#FFD27D">
        <animate attributeName="opacity" values="0.9;0;0.9" dur="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-38" cy="4" r="1.3" fill="#FF8A3D">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <circle cx="-46" cy="-2" r="1.1" fill="#FFD27D">
        <animate attributeName="opacity" values="0.7;0;0.7" dur="0.7s" repeatCount="indefinite" begin="0.35s"/>
      </circle>

      <!-- Rocket body, rotated to point right -->
      <g transform="rotate(90)">
        <path d="M0,-26 C9,-16 9,8 6,18 L-6,18 C-9,8 -9,-16 0,-26 Z" fill="#E7E9F3"/>
        <path d="M0,-26 C4,-19 4,-8 0,-2 C-4,-8 -4,-19 0,-26 Z" fill="#FF6B6B"/>
        <path d="M-6,16 L-16,26 L-6,24 Z" fill="#6E56CF"/>
        <path d="M6,16 L16,26 L6,24 Z" fill="#6E56CF"/>
        <circle cx="0" cy="-2" r="4.5" fill="#88C9FF"/>
      </g>
    </g>
  </g>
</svg>
